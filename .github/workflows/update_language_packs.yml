name: 'Update: Language packs'

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'share/locale/*.ts'
      - 'buildscripts/ci/languages/generate_language_packs.py'

jobs:
  update-language-packs:
    runs-on: ubuntu-slim
    steps:
      - name: Clone repository
        uses: actions/checkout@v7

      - name: Install Qt (for lrelease)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          host: "linux"
          target: "desktop"
          arch: "linux_gcc_64"
          cache: true

      - name: Generate language packs
        run: |
          python3 buildscripts/ci/languages/generate_language_packs.py --lrelease "$(which lrelease)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/backend/languages
          if git diff --cached --quiet; then
            echo "No changes to language packs"
            exit 0
          fi
          git commit -m "Update language packs from share/locale/*.ts"
          git push origin HEAD:main
